spack:
  view: false

  concretizer:
    unify: when_possible

  config:
    install_tree:
      root: /opt/spack

  specs:
    # Python-related dependencies
    - python@3.11
    - py-pip
    - py-setuptools
    - py-wheel
    - py-numpy@1.26.4

    # MPICH for ISSM
    - mpich@4.2.3 +fortran ~wrapperrpath
    
  repos:
    - /opt/icesee-spack